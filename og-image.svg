<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <!-- Asymmetric radial gradient background -->
    <radialGradient id="bgGradient" cx="25%" cy="35%" r="85%">
      <stop offset="0%" stop-color="#262220"/>
      <stop offset="50%" stop-color="#1c1917"/>
      <stop offset="100%" stop-color="#0f0e0c"/>
    </radialGradient>

    <!-- Subtle vertical grid lines -->
    <pattern id="gridLines" width="100" height="630" patternUnits="userSpaceOnUse">
      <line x1="100" y1="0" x2="100" y2="630" stroke="#2dd4bf" stroke-width="0.5" opacity="0.05"/>
    </pattern>

    <!-- Subtle horizontal grid lines -->
    <pattern id="hGridLines" width="1200" height="80" patternUnits="userSpaceOnUse">
      <line x1="0" y1="80" x2="1200" y2="80" stroke="#2dd4bf" stroke-width="0.5" opacity="0.03"/>
    </pattern>

    <!-- Horizontal accent line gradient (fades at edges) -->
    <linearGradient id="accentLineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#2dd4bf" stop-opacity="0"/>
      <stop offset="15%" stop-color="#2dd4bf" stop-opacity="0.25"/>
      <stop offset="50%" stop-color="#2dd4bf" stop-opacity="0.35"/>
      <stop offset="85%" stop-color="#2dd4bf" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#2dd4bf" stop-opacity="0"/>
    </linearGradient>

    <!-- CTA button gradient -->
    <linearGradient id="ctaGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#2dd4bf"/>
      <stop offset="100%" stop-color="#14b8a6"/>
    </linearGradient>

    <!-- Subtle corner glow -->
    <radialGradient id="cornerGlow" cx="0%" cy="0%" r="50%">
      <stop offset="0%" stop-color="#2dd4bf" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#2dd4bf" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGradient)"/>

  <!-- Grid overlay -->
  <rect width="1200" height="630" fill="url(#gridLines)"/>
  <rect width="1200" height="630" fill="url(#hGridLines)"/>

  <!-- Corner glow (top-left) -->
  <rect width="600" height="400" fill="url(#cornerGlow)"/>

  <!-- Horizontal accent line -->
  <line x1="0" y1="395" x2="1200" y2="395" stroke="url(#accentLineGrad)" stroke-width="1"/>

  <!-- Subtle border -->
  <rect x="0.5" y="0.5" width="1199" height="629" rx="0" fill="none" stroke="#2dd4bf" stroke-width="1" opacity="0.08"/>

  <!-- === CONTENT === -->

  <!-- Avatar circle (CM monogram) -->
  <circle cx="600" cy="155" r="48" fill="#262220" stroke="#2dd4bf" stroke-width="1.5" opacity="0.9"/>
  <text x="600" y="170" text-anchor="middle" font-family="'JetBrains Mono', 'Courier New', monospace" font-size="28" font-weight="700" fill="#f0eeeb" letter-spacing="1">CM</text>

  <!-- Name -->
  <text x="600" y="250" text-anchor="middle" font-family="'JetBrains Mono', 'Courier New', monospace" font-size="38" font-weight="700" fill="#f0eeeb">Christopher Mercer</text>

  <!-- Role -->
  <text x="600" y="290" text-anchor="middle" font-family="'JetBrains Mono', 'Courier New', monospace" font-size="18" font-weight="500" fill="#a8a29e" letter-spacing="2">SYSTEMS ARCHITECT · BLOCKCHAIN · AI</text>

  <!-- Badges row -->
  <!-- Badge 1: Protocol Architecture -->
  <rect x="155" y="330" width="195" height="34" rx="17" fill="#2dd4bf" fill-opacity="0.08" stroke="#2dd4bf" stroke-opacity="0.15" stroke-width="1"/>
  <text x="252.5" y="352" text-anchor="middle" font-family="'JetBrains Mono', 'Courier New', monospace" font-size="11" font-weight="500" fill="#2dd4bf" opacity="0.85">Protocol Architecture</text>

  <!-- Badge 2: Smart Contracts -->
  <rect x="365" y="330" width="165" height="34" rx="17" fill="#2dd4bf" fill-opacity="0.08" stroke="#2dd4bf" stroke-opacity="0.15" stroke-width="1"/>
  <text x="447.5" y="352" text-anchor="middle" font-family="'JetBrains Mono', 'Courier New', monospace" font-size="11" font-weight="500" fill="#2dd4bf" opacity="0.85">Smart Contracts</text>

  <!-- Badge 3: Governance -->
  <rect x="545" y="330" width="130" height="34" rx="17" fill="#2dd4bf" fill-opacity="0.08" stroke="#2dd4bf" stroke-opacity="0.15" stroke-width="1"/>
  <text x="610" y="352" text-anchor="middle" font-family="'JetBrains Mono', 'Courier New', monospace" font-size="11" font-weight="500" fill="#2dd4bf" opacity="0.85">Governance</text>

  <!-- Badge 4: Data Architecture -->
  <rect x="690" y="330" width="180" height="34" rx="17" fill="#2dd4bf" fill-opacity="0.08" stroke="#2dd4bf" stroke-opacity="0.15" stroke-width="1"/>
  <text x="780" y="352" text-anchor="middle" font-family="'JetBrains Mono', 'Courier New', monospace" font-size="11" font-weight="500" fill="#2dd4bf" opacity="0.85">Data Architecture</text>

  <!-- CTA Button -->
  <rect x="460" y="430" width="280" height="48" rx="24" fill="url(#ctaGrad)"/>
  <text x="600" y="460" text-anchor="middle" font-family="'JetBrains Mono', 'Courier New', monospace" font-size="14" font-weight="600" fill="#1c1917">Explore My Work</text>

  <!-- Tagline below CTA -->
  <text x="600" y="510" text-anchor="middle" font-family="'JetBrains Mono', 'Courier New', monospace" font-size="12" font-weight="400" fill="#a8a29e" opacity="0.7">Architect who ships — from protocol design to production</text>

  <!-- URL bottom-right -->
  <text x="1150" y="600" text-anchor="end" font-family="'JetBrains Mono', 'Courier New', monospace" font-size="11" font-weight="400" fill="#a8a29e" opacity="0.5">christophermercer.org</text>
</svg>
